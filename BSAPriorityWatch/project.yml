name: BSAPriorityWatch
targets:
  BSAPriorityWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - WatchApp
      - Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: surf.bsa.priority.watchkitapp
      GENERATE_INFOPLIST_FILE: true
      SWIFT_VERSION: "6.0"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      TARGETED_DEVICE_FAMILY: "4"
      INFOPLIST_KEY_WKApplication: true
      INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: true
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: "surf.bsa.priority"
