<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BSA Compete — Judge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06111F;
    --bg-card: #0A1929;
    --bg-cell: #0D2137;
    --bg-cell-hover: #112A45;
    --bg-cell-best: rgba(43,165,160,0.08);
    --border: rgba(255,255,255,0.04);
    --border-cell: rgba(255,255,255,0.06);
    --text-primary: #F1F5F9;
    --text-secondary: rgba(255,255,255,0.35);
    --text-muted: rgba(255,255,255,0.12);
    --teal: #2BA5A0;
    --teal-glow: rgba(43,165,160,0.15);
    --gold: #FFD700;
    --red: #DC2626;
    --blue: #2563EB;
    --white-jersey: #E2E8F0;
    --yellow: #EAB308;
    --green: #16A34A;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    height: 100dvh; overflow: hidden;
    background: var(--bg); color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    height: 100dvh; display: flex; flex-direction: column;
  }

  /* ═══ HEADER ═══ */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(43,165,160,0.03) 0%, transparent 100%);
  }
  .header-left { display: flex; align-items: baseline; gap: 12px; }
  .heat-label {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .heat-meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  .timer-container { text-align: center; }
  .timer {
    font-family: var(--font-mono); font-size: 44px; font-weight: 800;
    letter-spacing: 0.08em; line-height: 1;
    background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .timer.warn {
    background: linear-gradient(180deg, #EF4444 30%, #DC2626 100%);
    -webkit-background-clip: text; background-clip: text;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .isa-btn {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    color: var(--teal); background: var(--teal-glow); border: 1px solid rgba(43,165,160,0.15);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; letter-spacing: 0.08em;
  }
  .judge-name {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
  }

  /* ═══ PRIORITY STRIP ═══ */
  .priority-strip {
    display: flex; align-items: center; gap: 2px;
    padding: 6px 24px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.01);
  }
  .priority-label {
    font-family: var(--font-mono); font-size: 9px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.12em; margin-right: 8px;
  }
  .priority-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 4px; font-size: 11px;
    font-family: var(--font-mono); font-weight: 600;
    transition: all 0.2s;
  }
  .priority-chip.p1 { background: rgba(255,215,0,0.08); color: var(--gold); }
  .priority-chip.p2, .priority-chip.p3, .priority-chip.p4 { color: var(--text-secondary); }
  .priority-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ═══ SCORING GRID ═══ */
  .grid-container {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    padding: 0;
  }

  /* Column headers */
  .grid-header {
    display: flex; align-items: center; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .col-athlete { width: 220px; flex-shrink: 0; padding: 8px 24px; }
  .col-waves { flex: 1; display: flex; }
  .col-wave-header {
    flex: 1; min-width: 72px; text-align: center; padding: 8px 4px;
    font-family: var(--font-mono); font-size: 9px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.1em;
  }
  .col-total-header {
    width: 120px; flex-shrink: 0; text-align: center; padding: 8px 12px;
    font-family: var(--font-mono); font-size: 9px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.1em;
  }
  .col-needs-header {
    width: 90px; flex-shrink: 0; text-align: center; padding: 8px 12px;
    font-family: var(--font-mono); font-size: 9px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.1em;
  }

  /* Athlete rows */
  .grid-body { flex: 1; display: flex; flex-direction: column; }
  .athlete-row {
    flex: 1; display: flex; align-items: center;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    min-height: 0;
    position: relative;
  }
  .athlete-row:last-child { border-bottom: none; }

  /* Jersey bar */
  .jersey-bar {
    width: 5px; align-self: stretch; flex-shrink: 0;
    border-radius: 0 3px 3px 0;
  }

  /* Athlete info */
  .athlete-info {
    width: 215px; flex-shrink: 0; padding: 0 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .jersey-swatch {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 800;
    color: rgba(0,0,0,0.5);
  }
  .jersey-swatch.light-text { color: rgba(255,255,255,0.7); }
  .athlete-name-block { }
  .athlete-name {
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    letter-spacing: -0.01em; line-height: 1.2;
  }
  .athlete-badges {
    display: flex; gap: 4px; margin-top: 2px;
  }
  .badge-priority {
    font-family: var(--font-mono); font-size: 9px; font-weight: 800;
    padding: 1px 5px; border-radius: 3px;
    background: rgba(255,215,0,0.1); color: var(--gold);
  }
  .badge-int {
    font-family: var(--font-mono); font-size: 9px; font-weight: 800;
    padding: 1px 5px; border-radius: 3px;
    background: rgba(220,38,38,0.1); color: var(--red);
  }

  /* Wave cells */
  .wave-cells { flex: 1; display: flex; align-self: stretch; }
  .wave-cell {
    flex: 1; min-width: 72px; display: flex; align-items: center; justify-content: center;
    border-left: 1px solid var(--border-cell);
    cursor: pointer; transition: all 0.12s; position: relative;
    user-select: none;
  }
  .wave-cell:hover { background: var(--bg-cell-hover); }
  .wave-cell.empty::after {
    content: '+'; font-family: var(--font-mono); font-size: 16px;
    color: rgba(255,255,255,0.06);
  }
  .wave-cell.empty:hover::after { color: var(--teal); }
  .wave-cell.scored {
    background: var(--bg-cell);
  }
  .wave-cell.best {
    background: var(--bg-cell-best);
    box-shadow: inset 0 0 0 1px rgba(43,165,160,0.15);
  }
  .wave-score {
    font-family: var(--font-mono); font-weight: 700; letter-spacing: 0.02em;
  }
  .wave-score.s-low { font-size: 20px; color: rgba(220,38,38,0.7); }
  .wave-score.s-fair { font-size: 20px; color: rgba(234,179,8,0.7); }
  .wave-score.s-avg { font-size: 20px; color: rgba(255,255,255,0.45); }
  .wave-score.s-good { font-size: 20px; color: var(--teal); }
  .wave-score.s-exc { font-size: 20px; color: var(--blue); }
  .wave-score.s-perf { font-size: 20px; color: var(--gold); }
  .wave-cell.best .wave-score { font-size: 22px; }
  .wave-cell.best .wave-score.s-good { color: #3BD4CE; }
  .best-marker {
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: var(--teal);
    opacity: 0.5;
  }

  /* Total */
  .total-cell {
    width: 120px; flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-left: 2px solid rgba(43,165,160,0.1);
    padding: 0 12px;
  }
  .total-score {
    font-family: var(--font-mono); font-size: 28px; font-weight: 800;
    letter-spacing: 0.02em; line-height: 1;
  }
  .total-score.leading { color: var(--teal); }
  .total-label {
    font-family: var(--font-mono); font-size: 8px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.1em; margin-top: 2px;
  }

  /* Needs */
  .needs-cell {
    width: 90px; flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-left: 1px solid var(--border-cell);
    padding: 0 8px;
  }
  .needs-score {
    font-family: var(--font-mono); font-size: 16px; font-weight: 600;
    color: var(--text-secondary); letter-spacing: 0.02em;
  }
  .needs-label {
    font-family: var(--font-mono); font-size: 8px; font-weight: 500;
    color: var(--text-muted); letter-spacing: 0.08em; margin-top: 1px;
  }

  /* ═══ FOOTER ═══ */
  .footer {
    padding: 6px 24px; flex-shrink: 0;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.01);
  }
  .footer-left {
    font-family: var(--font-mono); font-size: 9px; color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .footer-right {
    font-family: var(--font-mono); font-size: 9px; color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* ═══ NUMPAD POPOVER ═══ */
  .numpad-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: none;
  }
  .numpad-overlay.active { display: block; }
  .numpad-scrim {
    position: absolute; inset: 0;
    background: rgba(6,17,31,0.5);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  }
  .numpad {
    position: absolute; z-index: 101;
    background: #0B2440;
    border: 1px solid rgba(43,165,160,0.15);
    border-radius: 16px; padding: 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    width: 340px;
  }
  .numpad-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; padding: 0 2px;
  }
  .numpad-athlete {
    font-family: var(--font-display); font-size: 14px; font-weight: 700;
  }
  .numpad-wave {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
  }
  .numpad-preview {
    text-align: center; margin-bottom: 12px; padding: 8px 0;
    border-radius: 10px; background: rgba(255,255,255,0.02);
  }
  .numpad-preview-score {
    font-family: var(--font-mono); font-size: 48px; font-weight: 800;
    transition: color 0.1s;
  }
  .numpad-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    margin-bottom: 10px;
  }
  .numpad-btn {
    padding: 14px 0; border-radius: 10px; border: none;
    font-family: var(--font-mono); font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.1s;
    background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5);
  }
  .numpad-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
  .numpad-btn:active { transform: scale(0.96); }
  .numpad-btn.selected {
    background: rgba(43,165,160,0.15); color: var(--teal);
    box-shadow: inset 0 0 0 1.5px rgba(43,165,160,0.3);
  }
  .numpad-submit {
    width: 100%; padding: 14px 0; border-radius: 12px; border: none;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    background: var(--teal); color: #fff;
  }
  .numpad-submit:hover { filter: brightness(1.1); }
  .numpad-submit:disabled { opacity: 0.15; cursor: default; }
  .numpad-submit:active:not(:disabled) { transform: scale(0.98); }

  /* ═══ ISA SCALE TOOLTIP ═══ */
  .isa-panel {
    position: fixed; top: 48px; right: 24px; z-index: 90;
    background: #0B2440; border: 1px solid var(--border-cell);
    border-radius: 12px; padding: 12px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none; min-width: 200px;
  }
  .isa-panel.active { display: block; }
  .isa-row {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 0; font-family: var(--font-mono); font-size: 11px;
  }
  .isa-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .isa-range { color: var(--text-secondary); width: 44px; }
  .isa-label { font-weight: 600; }

  /* ═══ VIEW TOGGLE ═══ */
  .view-toggle {
    position: fixed; bottom: 16px; right: 24px; z-index: 80;
    display: flex; gap: 2px; background: var(--bg-card);
    border: 1px solid var(--border-cell); border-radius: 10px;
    padding: 3px; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .view-btn {
    padding: 6px 14px; border-radius: 7px; border: none;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    color: var(--text-secondary); background: transparent;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .view-btn.active { background: var(--teal); color: #fff; }

  /* ═══ HEAD JUDGE OVERRIDES ═══ */
  .hj-mode .wave-cell.scored { cursor: pointer; }
  .hj-mode .wave-cell.scored:hover { background: rgba(43,165,160,0.06); }
  .judge-scores {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px;
  }
  .judge-score-pip {
    font-family: var(--font-mono); font-size: 9px; font-weight: 600;
    color: rgba(255,255,255,0.18); letter-spacing: 0.02em;
  }
  .judge-score-pip.outlier { color: rgba(220,38,38,0.5); }
  .judge-score-pip.dropped { color: rgba(255,255,255,0.06); text-decoration: line-through; }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <span class="heat-label">Heat 1</span>
      <span class="heat-meta">Open Men · Semi-Final</span>
    </div>
    <div class="timer-container">
      <div class="timer" id="timer">18:42</div>
    </div>
    <div class="header-right">
      <button class="isa-btn" onclick="toggleISA()">ISA</button>
      <span class="judge-name">J2 · Williams</span>
    </div>
  </div>

  <!-- PRIORITY -->
  <div class="priority-strip">
    <span class="priority-label">PRIORITY</span>
    <span class="priority-chip p1"><span class="priority-dot" style="background:#DC2626"></span>P1 Burke</span>
    <span class="priority-chip p2"><span class="priority-dot" style="background:#2563EB"></span>P2 Hinds</span>
    <span class="priority-chip p3"><span class="priority-dot" style="background:#E2E8F0"></span>P3 Chase</span>
    <span class="priority-chip p4"><span class="priority-dot" style="background:#EAB308"></span>P4 Gill</span>
  </div>

  <!-- GRID -->
  <div class="grid-container">
    <!-- Column headers -->
    <div class="grid-header">
      <div class="col-athlete" style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:0.1em">ATHLETE</div>
      <div class="col-waves" id="wave-headers"></div>
      <div class="col-total-header">TOTAL</div>
      <div class="col-needs-header">NEEDS</div>
    </div>

    <!-- Rows -->
    <div class="grid-body" id="grid-body"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-left">BLIND JUDGING · YOUR SCORES ONLY</span>
    <span class="footer-right">BSA COMPETE</span>
  </div>
</div>

<!-- ISA Panel -->
<div class="isa-panel" id="isa-panel">
  <div class="isa-row"><span class="isa-dot" style="background:#DC2626"></span><span class="isa-range">0 – 1.9</span><span class="isa-label" style="color:#DC2626">Poor</span></div>
  <div class="isa-row"><span class="isa-dot" style="background:#EA580C"></span><span class="isa-range">2 – 3.9</span><span class="isa-label" style="color:#EA580C">Fair</span></div>
  <div class="isa-row"><span class="isa-dot" style="background:#EAB308"></span><span class="isa-range">4 – 5.9</span><span class="isa-label" style="color:#EAB308">Average</span></div>
  <div class="isa-row"><span class="isa-dot" style="background:#2BA5A0"></span><span class="isa-range">6 – 7.9</span><span class="isa-label" style="color:#2BA5A0">Good</span></div>
  <div class="isa-row"><span class="isa-dot" style="background:#2563EB"></span><span class="isa-range">8 – 9.9</span><span class="isa-label" style="color:#2563EB">Excellent</span></div>
  <div class="isa-row"><span class="isa-dot" style="background:#FFD700"></span><span class="isa-range">10</span><span class="isa-label" style="color:#FFD700">Perfect</span></div>
</div>

<!-- Numpad overlay -->
<div class="numpad-overlay" id="numpad-overlay">
  <div class="numpad-scrim" onclick="closeNumpad()"></div>
  <div class="numpad" id="numpad">
    <div class="numpad-header">
      <span class="numpad-athlete" id="numpad-athlete"></span>
      <span class="numpad-wave" id="numpad-wave"></span>
    </div>
    <div class="numpad-preview">
      <div class="numpad-preview-score" id="numpad-preview" style="color:var(--text-muted)">—.—</div>
    </div>
    <div class="numpad-grid" id="numpad-grid"></div>
    <button class="numpad-submit" id="numpad-submit" disabled onclick="submitScore()">Select a Score</button>
  </div>
</div>

<!-- View toggle -->
<div class="view-toggle">
  <button class="view-btn active" onclick="setView('judge', this)">JUDGE</button>
  <button class="view-btn" onclick="setView('head', this)">HEAD JUDGE</button>
</div>

<script>
// ═══ DEMO DATA ═══
const MAX_WAVES = 10;
const athletes = [
  { id: 'a1', name: 'Tyler Burke', jersey: 'red', color: '#DC2626', priority: 1,
    waves: [7.5, 6.0, 8.3, 5.5, 4.0, null, null, null, null, null],
    judgeScores: [[7.0,7.5,8.0,7.5,7.5],[5.5,6.0,6.5,6.0,6.0],[8.0,8.5,8.0,8.5,8.0],[5.0,5.5,6.0,5.5,5.5],[3.5,4.0,4.5,4.0,4.0],[],[],[],[],[]]
  },
  { id: 'a2', name: 'Marcus Hinds', jersey: 'blue', color: '#2563EB', priority: 2,
    waves: [5.0, 7.0, 3.5, 6.5, null, null, null, null, null, null],
    judgeScores: [[4.5,5.0,5.5,5.0,5.0],[6.5,7.0,7.5,7.0,7.0],[3.0,3.5,4.0,3.5,3.5],[6.0,6.5,7.0,6.5,6.5],[],[],[],[],[],[]]
  },
  { id: 'a3', name: 'Dylan Chase', jersey: 'white', color: '#E2E8F0', priority: 3,
    waves: [6.5, 4.5, 7.0, null, null, null, null, null, null, null],
    judgeScores: [[6.0,6.5,7.0,6.5,6.5],[4.0,4.5,5.0,4.5,4.5],[6.5,7.0,7.5,7.0,7.0],[],[],[],[],[],[],[]]
  },
  { id: 'a4', name: 'Andre Gill', jersey: 'yellow', color: '#EAB308', priority: 4,
    waves: [3.0, 5.5, null, null, null, null, null, null, null, null],
    judgeScores: [[2.5,3.0,3.5,3.0,3.0],[5.0,5.5,6.0,5.5,5.5],[],[],[],[],[],[],[],[]]
  }
];

function scoreClass(s) {
  if (s >= 10) return 's-perf';
  if (s >= 8) return 's-exc';
  if (s >= 6) return 's-good';
  if (s >= 4) return 's-avg';
  if (s >= 2) return 's-fair';
  return 's-low';
}

function scoreColor(s) {
  if (s >= 10) return '#FFD700';
  if (s >= 8) return '#2563EB';
  if (s >= 6) return '#2BA5A0';
  if (s >= 4) return '#EAB308';
  if (s >= 2) return '#EA580C';
  return '#DC2626';
}

function getBest2(waves) {
  const scored = waves.map((s, i) => ({ s, i })).filter(w => w.s !== null);
  scored.sort((a, b) => b.s - a.s);
  return scored.slice(0, 2).map(w => w.i);
}

function calcTotal(waves) {
  const best = getBest2(waves);
  return best.reduce((sum, i) => sum + (waves[i] || 0), 0);
}

let currentView = 'judge';
let activeNumpad = null;
let selectedScore = null;

function render() {
  // Wave headers
  const wh = document.getElementById('wave-headers');
  wh.innerHTML = '';
  for (let i = 0; i < MAX_WAVES; i++) {
    wh.innerHTML += `<div class="col-wave-header">W${i + 1}</div>`;
  }

  // Sort by total
  const sorted = [...athletes].map(a => ({ ...a, total: calcTotal(a.waves), best: getBest2(a.waves) }));
  sorted.sort((a, b) => b.total - a.total);
  const leaderTotal = sorted[0].total;

  const body = document.getElementById('grid-body');
  body.innerHTML = '';

  sorted.forEach((athlete, rank) => {
    const row = document.createElement('div');
    row.className = `athlete-row${currentView === 'head' ? ' hj-mode' : ''}`;

    const isWhite = athlete.jersey === 'white';
    const isBlack = athlete.jersey === 'black';
    const textClass = (isBlack) ? 'light-text' : '';

    // Jersey bar
    let html = `<div class="jersey-bar" style="background:${athlete.color}"></div>`;

    // Athlete info
    html += `<div class="athlete-info">`;
    html += `<div class="jersey-swatch ${textClass}" style="background:${athlete.color};${isWhite ? 'border:1px solid rgba(255,255,255,0.2)' : ''}">${rank + 1}</div>`;
    html += `<div class="athlete-name-block">`;
    html += `<div class="athlete-name">${athlete.name}</div>`;
    html += `<div class="athlete-badges">`;
    if (athlete.priority === 1) html += `<span class="badge-priority">P1</span>`;
    html += `</div></div></div>`;

    // Wave cells
    html += `<div class="wave-cells">`;
    for (let i = 0; i < MAX_WAVES; i++) {
      const score = athlete.waves[i];
      const isBest = athlete.best.includes(i);
      if (score !== null) {
        html += `<div class="wave-cell scored${isBest ? ' best' : ''}" data-athlete="${athlete.id}" data-wave="${i}">`;
        html += `<span class="wave-score ${scoreClass(score)}">${score.toFixed(1)}</span>`;
        if (isBest) html += `<span class="best-marker"></span>`;
        if (currentView === 'head' && athlete.judgeScores[i]?.length) {
          html += `<div class="judge-scores">`;
          const js = [...athlete.judgeScores[i]];
          if (js.length >= 5) {
            const sorted = [...js].sort((a,b)=>a-b);
            const lo = sorted[0], hi = sorted[sorted.length-1];
            let loDropped = false, hiDropped = false;
            js.forEach(s => {
              const isDrop = (!loDropped && s === lo) || (!hiDropped && s === hi);
              if (!loDropped && s === lo) loDropped = true;
              else if (!hiDropped && s === hi) hiDropped = true;
              const avg = js.reduce((a,b)=>a+b,0)/js.length;
              const outlier = Math.abs(s - avg) > 1.5;
              html += `<span class="judge-score-pip${isDrop?' dropped':''}${outlier?' outlier':''}">${s.toFixed(1)}</span>`;
            });
          } else {
            js.forEach(s => {
              html += `<span class="judge-score-pip">${s.toFixed(1)}</span>`;
            });
          }
          html += `</div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="wave-cell empty" data-athlete="${athlete.id}" data-wave="${i}" onclick="openNumpad('${athlete.id}', ${i}, this)"></div>`;
      }
    }
    html += `</div>`;

    // Total
    const isLeader = athlete.total === leaderTotal && athlete.total > 0;
    html += `<div class="total-cell">`;
    html += `<span class="total-score${isLeader ? ' leading' : ''}">${athlete.total.toFixed(2)}</span>`;
    html += `<span class="total-label">BEST 2</span>`;
    html += `</div>`;

    // Needs
    html += `<div class="needs-cell">`;
    if (rank > 0 && athlete.total > 0) {
      const needs = leaderTotal - athlete.total + 0.01;
      const scoredWaves = athlete.waves.filter(w => w !== null);
      const bestCount = Math.min(scoredWaves.length, 2);
      if (needs > 0 && needs <= 10) {
        html += `<span class="needs-score">${needs.toFixed(2)}</span>`;
        html += `<span class="needs-label">TO LEAD</span>`;
      } else if (needs > 10) {
        html += `<span class="needs-score" style="color:var(--text-muted)">—</span>`;
      }
    }
    html += `</div>`;

    row.innerHTML = html;
    body.appendChild(row);
  });
}

function openNumpad(athleteId, waveIndex, cellEl) {
  const athlete = athletes.find(a => a.id === athleteId);
  if (!athlete) return;

  activeNumpad = { athleteId, waveIndex, cellEl };
  selectedScore = null;

  document.getElementById('numpad-athlete').textContent = athlete.name;
  document.getElementById('numpad-athlete').style.color = athlete.color;
  document.getElementById('numpad-wave').textContent = `WAVE ${waveIndex + 1}`;
  document.getElementById('numpad-preview').textContent = '—.—';
  document.getElementById('numpad-preview').style.color = 'var(--text-muted)';
  document.getElementById('numpad-submit').disabled = true;
  document.getElementById('numpad-submit').textContent = 'Select a Score';

  // Position numpad near the cell
  const rect = cellEl.getBoundingClientRect();
  const numpad = document.getElementById('numpad');
  let left = rect.left + rect.width / 2 - 170;
  let top = rect.bottom + 8;
  if (top + 360 > window.innerHeight) top = rect.top - 368;
  if (left + 340 > window.innerWidth) left = window.innerWidth - 356;
  if (left < 16) left = 16;
  numpad.style.left = left + 'px';
  numpad.style.top = top + 'px';

  // Build buttons
  const grid = document.getElementById('numpad-grid');
  grid.innerHTML = '';
  const scores = [];
  for (let s = 0.5; s <= 10; s += 0.5) scores.push(s);
  scores.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'numpad-btn';
    btn.textContent = s.toFixed(1);
    btn.onclick = () => selectScore(s, btn);
    grid.appendChild(btn);
  });

  document.getElementById('numpad-overlay').classList.add('active');
}

function selectScore(score, btn) {
  selectedScore = score;
  document.querySelectorAll('.numpad-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('numpad-preview').textContent = score.toFixed(1);
  document.getElementById('numpad-preview').style.color = scoreColor(score);
  const sub = document.getElementById('numpad-submit');
  sub.disabled = false;
  sub.textContent = `Lock ${score.toFixed(1)}`;
}

function submitScore() {
  if (!activeNumpad || selectedScore === null) return;
  const athlete = athletes.find(a => a.id === activeNumpad.athleteId);
  if (athlete) {
    athlete.waves[activeNumpad.waveIndex] = selectedScore;
    // Fake judge scores for demo
    const base = selectedScore;
    athlete.judgeScores[activeNumpad.waveIndex] = [
      Math.max(0, Math.min(10, +(base - 0.5).toFixed(1))),
      base,
      Math.max(0, Math.min(10, +(base + 0.5).toFixed(1))),
      base,
      base
    ];
  }
  closeNumpad();
  render();
}

function closeNumpad() {
  document.getElementById('numpad-overlay').classList.remove('active');
  activeNumpad = null;
  selectedScore = null;
}

function toggleISA() {
  document.getElementById('isa-panel').classList.toggle('active');
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const footer = document.querySelector('.footer-left');
  if (view === 'head') {
    footer.textContent = 'HEAD JUDGE · ALL SCORES VISIBLE';
    document.querySelector('.footer').style.borderTopColor = 'rgba(255,215,0,0.1)';
  } else {
    footer.textContent = 'BLIND JUDGING · YOUR SCORES ONLY';
    document.querySelector('.footer').style.borderTopColor = '';
  }
  render();
}

// Timer countdown
let timeLeft = 18 * 60 + 42;
function updateTimer() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const el = document.getElementById('timer');
  el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  if (timeLeft <= 30) el.classList.add('warn');
  else el.classList.remove('warn');
  if (timeLeft > 0) timeLeft--;
}
setInterval(updateTimer, 1000);

// Click outside ISA panel to close
document.addEventListener('click', (e) => {
  if (!e.target.closest('.isa-panel') && !e.target.closest('.isa-btn')) {
    document.getElementById('isa-panel').classList.remove('active');
  }
});

// Init
render();
</script>

</body>
</html>
